<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sidekart · Skipper-styring</title>
<style>
  :root{
    --ink:#2A1810; --muted:rgba(42,24,16,.6); --gold:#C49A34;
    --line:rgba(0,0,0,.10); --conn:#c9bfa8;
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",system-ui,sans-serif;
    --skipper:#5ec8c8; --gate:#c9a15a; --kunde:#6ba8e8; --seo:#8fc46b; --book:#e8896b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font);color:var(--ink);overflow:hidden;background:#fbfaf8}
  header{position:fixed;inset:0 0 auto 0;z-index:30;padding:15px 22px;pointer-events:none;background:linear-gradient(#fbfaf8f2,#fbfaf800)}
  header h1{font-size:18px;font-weight:600;letter-spacing:-.01em}
  header .sub{font-size:12.5px;color:var(--muted);margin-top:2px}
  .legend{position:fixed;bottom:14px;left:22px;z-index:30;display:flex;gap:12px;flex-wrap:wrap;font-size:11.5px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:5px}.legend i{width:10px;height:10px;border-radius:3px}
  .hint{position:fixed;bottom:14px;right:22px;z-index:30;font-size:11.5px;color:var(--muted)}
  .ctrl{position:fixed;top:14px;right:22px;z-index:30;display:flex;gap:6px}
  .ctrl button{font-family:inherit;min-width:34px;height:32px;padding:0 8px;border:1px solid var(--line);background:#fff;border-radius:9px;cursor:pointer;font-size:15px;color:var(--ink)}
  .scene{position:fixed;inset:0;cursor:grab;touch-action:none;overflow:hidden}
  .scene.grabbing{cursor:grabbing}
  .world{position:absolute;left:50%;top:96px;transform-origin:0 0;will-change:transform;transform:translate(var(--tx,0px),var(--ty,0px)) scale(var(--s,.78))}
  svg.edges{position:absolute;left:0;top:0;overflow:visible;pointer-events:none}
  svg .lbl{font:600 10.5px var(--font);fill:var(--muted)}

  .node{position:absolute;width:236px;background:#fff;border:1px solid var(--line);border-top:3px solid var(--c,var(--skipper));
    border-radius:11px;padding:10px 13px 11px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 8px 20px rgba(60,40,10,.07)}
  .node .top{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}
  .node .top i{width:6px;height:6px;border-radius:50%;background:var(--c,var(--skipper))}
  .node h2{font-size:15px;font-weight:600;letter-spacing:-.01em;margin:4px 0 0}
  .node .meta{font-size:10px;line-height:1.45;color:var(--muted);margin-top:5px}
  .node.hot{border:1.5px solid var(--gold);border-top-width:3px;box-shadow:0 0 0 3px rgba(196,154,52,.14),0 10px 24px rgba(120,80,10,.14)}
</style>
</head>
<body>
<header><div><h1>Sidekart · Skipper-styring</h1><div class="sub" id="sub">Skipperen styrer priser → lagres live til D1 → driver landing · SEO · booking · kvittering. Dra = panorer · rull = zoom.</div></div></header>
<div class="ctrl"><button data-z="in">＋</button><button data-z="out">－</button><button data-z="reset">⟲</button></div>
<div class="scene" id="scene"><div class="world" id="world"><svg class="edges" id="edges"></svg></div></div>
<div class="legend">
  <span><i style="background:var(--skipper)"></i>Skipper</span>
  <span><i style="background:var(--gate)"></i>Database (D1)</span>
  <span><i style="background:var(--kunde)"></i>Reisende</span>
  <span><i style="background:var(--seo)"></i>SEO</span>
  <span><i style="background:var(--book)"></i>Bestilling</span>
</div>
<div class="hint">🖱️ dra · rull zoom</div>

<script>
"use strict";
(function(){
  var CATC={skipper:'--skipper',gate:'--gate',kunde:'--kunde',seo:'--seo',book:'--book'};
  var CW=236, HH=46;
  var N=[
    {id:'minside', t:'Skipper-admin', h:'Min side', c:'skipper', hot:1, x:0, y:0, m:'Skipper = admin for egne båter. Sett tider · fra hvor · turtyper · <b>priser</b> · beskrivelser · tilbud → <b>Endre + Lagre</b>'},
    {id:'d1', t:'Vår database', h:'D1', c:'gate', x:0, y:210, m:'Sannhet — lagres live. <b>Sikkert:</b> JWT skipper-only · parameterisert SQL · skipper eier KUN sin data · ingen PII-lekkasje'},

    {id:'land', t:'Reisende ser', h:'Landingsside /s/andrea', c:'kunde', x:-540, y:440, m:'Turer / priser / beskrivelser — live fra config'},
    {id:'seo', t:'Reisende ser', h:'SEO-sider', c:'seo', x:-180, y:440, m:'«Ledig tur nær deg» → hans turer og priser'},
    {id:'book', t:'Bestilling', h:'Booking-veiviser', c:'book', x:180, y:440, m:'Riktige priser i hvert steg (låst fra config)'},
    {id:'receipt', t:'Bestilling', h:'Kvittering', c:'book', x:540, y:440, m:'Riktig pris + evt tilbud'},

    {id:'tbook', t:'Reisende', h:'Booker', c:'kunde', x:0, y:660, m:'Pris låst fra config → reservasjon (requested). Konto auto.'},
    {id:'sreq', t:'Skipper', h:'Får forespørsel', c:'skipper', x:0, y:860, m:'Mine avganger: requested øverst (gull-badge)'},
    {id:'sconf', t:'Skipper', h:'Bekreft / Avslå', c:'skipper', x:0, y:1060, m:'PATCH status → booked / cancelled · skipper eier dette'}
  ];
  var E=[
    ['minside','d1',null,'Endre + Lagre'],
    ['d1','land',null,'pris'],['d1','seo'],['d1','book',null,'pris'],['d1','receipt'],
    ['land','tbook'],['book','tbook'],['receipt','tbook'],
    ['tbook','sreq'],['sreq','sconf']
  ];
  var byId={}; N.forEach(function(n){byId[n.id]=n});
  var esc=function(s){return String(s).replace(/[<>]/g,function(m){return m==='<'?'&lt;':'&gt;'})};
  var world=document.getElementById('world'), svg=document.getElementById('edges');

  var g='';
  E.forEach(function(e){
    var a=byId[e[0]], b=byId[e[1]], lbl=e[3];
    var px=a.x, py=a.y+HH, cx=b.x, cy=b.y-HH, mid=(py+cy)/2;
    g+='<path d="M '+px+' '+py+' V '+mid+' H '+cx+' V '+cy+'" fill="none" stroke="var(--conn)" stroke-width="1.5"/>';
    if(lbl) g+='<text class="lbl" x="'+((px+cx)/2)+'" y="'+(mid-4)+'" text-anchor="middle">'+esc(lbl)+'</text>';
  });
  svg.innerHTML=g;

  N.forEach(function(n){
    var el=document.createElement('div'); el.className='node'+(n.hot?' hot':'');
    el.style.left=(n.x-CW/2)+'px'; el.style.top=(n.y-HH)+'px'; el.style.setProperty('--c','var('+CATC[n.c]+')');
    el.innerHTML='<div class="top"><i></i>'+esc(n.t)+'</div><h2>'+esc(n.h)+'</h2>'+(n.m?'<div class="meta">'+n.m+'</div>':'');
    world.appendChild(el);
  });

  var s=.78,tx=0,ty=0,drag=false,lx=0,ly=0,raf=0;
  function draw(){raf=0;var w=world.style;w.setProperty('--s',s);w.setProperty('--tx',tx+'px');w.setProperty('--ty',ty+'px');}
  function go(){if(!raf)raf=requestAnimationFrame(draw);}
  var scene=document.getElementById('scene');
  scene.addEventListener('pointerdown',function(e){drag=true;lx=e.clientX;ly=e.clientY;scene.classList.add('grabbing');scene.setPointerCapture&&scene.setPointerCapture(e.pointerId);});
  scene.addEventListener('pointermove',function(e){if(!drag)return;tx+=e.clientX-lx;ty+=e.clientY-ly;lx=e.clientX;ly=e.clientY;go();});
  function end(){drag=false;scene.classList.remove('grabbing');}
  scene.addEventListener('pointerup',end);scene.addEventListener('pointercancel',end);
  scene.addEventListener('wheel',function(e){e.preventDefault();s=Math.max(.3,Math.min(1.6,s+(e.deltaY<0?.1:-.1)));go();},{passive:false});
  document.querySelector('.ctrl').addEventListener('click',function(e){var z=e.target.getAttribute('data-z');if(!z)return;if(z==='in')s=Math.min(1.6,s+.1);else if(z==='out')s=Math.max(.3,s-.1);else{s=.78;tx=0;ty=0;}go();});
  draw();
})();
</script>
</body>
</html>
