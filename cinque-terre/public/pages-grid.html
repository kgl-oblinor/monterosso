<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sidekart · rutenett (dra for å bytte plass)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#07182a;--ink2:#0a1f33;--cream:#fdf6ea;--gold:#ead27e;
    --land:#ead27e;--book:#e8896b;--seo:#8fc46b;--kunde:#6ba8e8;--skipper:#5ec8c8;--admin:#b79ae8;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Fraunces",Georgia,serif;color:var(--cream);
    background:radial-gradient(120% 120% at 50% 0%,#0e2740 0%,var(--ink2) 45%,var(--ink) 100%);min-height:100vh}
  header{position:sticky;top:0;z-index:20;backdrop-filter:blur(10px);
    background:rgba(7,24,42,.82);border-bottom:1px solid rgba(253,246,234,.1);
    padding:16px clamp(16px,3vw,36px);display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  header h1{font-size:20px;font-weight:600;letter-spacing:-.01em}
  header .sub{font-size:13px;color:rgba(253,246,234,.55);font-weight:300}
  .spacer{flex:1}
  .btn{font-family:inherit;background:rgba(253,246,234,.06);border:1px solid rgba(253,246,234,.16);
    color:var(--cream);padding:8px 14px;font-size:13px;cursor:pointer;transition:.18s}
  .btn:hover{background:rgba(234,210,126,.16);border-color:var(--gold);color:var(--gold)}
  .legend{display:flex;gap:14px;flex-wrap:wrap;padding:12px clamp(16px,3vw,36px) 0;font-size:12px;color:rgba(253,246,234,.6)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:11px;height:11px;display:inline-block}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:14px;padding:18px clamp(16px,3vw,36px) 80px}
  .tile{background:rgba(253,246,234,.05);border:1px solid rgba(253,246,234,.12);
    border-left:3px solid var(--c);cursor:grab;user-select:none;position:relative;
    display:flex;flex-direction:column;transition:transform .12s,box-shadow .12s,opacity .12s}
  .tile:hover{box-shadow:0 6px 22px rgba(0,0,0,.35)}
  .tile.dragging{opacity:.4;cursor:grabbing}
  .tile.over{outline:2px dashed var(--gold);outline-offset:2px}
  .thumb{position:relative;height:150px;overflow:hidden;background:rgba(0,0,0,.25);border-bottom:1px solid rgba(253,246,234,.08)}
  .thumb iframe{position:absolute;top:0;left:0;width:1100px;height:750px;border:0;
    transform:scale(.2);transform-origin:top left;pointer-events:none;background:#0a1f33}
  .thumb .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:30px;color:var(--c);opacity:.5}
  .meta{padding:11px 13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .meta .nm{font-size:14.5px;font-weight:600;line-height:1.2}
  .meta .cat{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--c);font-weight:600}
  .meta a{color:rgba(253,246,234,.5);text-decoration:none;font-size:12px;flex-shrink:0}
  .meta a:hover{color:var(--gold)}
  .pos{position:absolute;top:7px;left:9px;font-size:11px;font-weight:700;color:var(--ink);
    background:var(--c);width:20px;height:20px;display:flex;align-items:center;justify-content:center;z-index:2}
  #out{position:fixed;bottom:0;left:0;right:0;background:rgba(7,24,42,.95);border-top:1px solid var(--gold);
    padding:14px clamp(16px,3vw,36px);font-size:12px;color:rgba(253,246,234,.8);display:none;max-height:40vh;overflow:auto}
  #out pre{white-space:pre-wrap;word-break:break-all;font-family:ui-monospace,monospace;font-size:11.5px;margin-top:8px}
</style>
</head>
<body>
<header>
  <div><h1>Sidekart · rutenett</h1><div class="sub">Dra én side oppå en annen for å <b>bytte plass</b>. Layouten lagres automatisk.</div></div>
  <div class="spacer"></div>
  <button class="btn" id="prev">👁 Forhåndsvisning: av</button>
  <button class="btn" id="exp">⤓ Eksporter rekkefølge</button>
  <button class="btn" id="reset">↺ Nullstill</button>
</header>
<div class="legend">
  <span><i class="dot" style="background:var(--land)"></i>Landing</span>
  <span><i class="dot" style="background:var(--book)"></i>Booking</span>
  <span><i class="dot" style="background:var(--seo)"></i>Innhold/SEO</span>
  <span><i class="dot" style="background:var(--kunde)"></i>Kunde</span>
  <span><i class="dot" style="background:var(--skipper)"></i>Skipper</span>
  <span><i class="dot" style="background:var(--admin)"></i>Admin</span>
</div>
<div class="grid" id="grid"></div>
<div id="out"></div>

<script>
  var LAND="https://monterosso-cinque-terre.kgl-56a.workers.dev";
  var APP="https://monterosso-app-preview.kgl-56a.workers.dev";
  var ICON={land:"🌊",book:"🎟️",seo:"📄",kunde:"👤",skipper:"⚓",admin:"🛡️"};
  // id, label, category, url
  var PAGES=[
    ["scene","Hav-scene","land",LAND+"/?scene"],
    ["boat","Aboard the boat","land",LAND+"/?screen=boat"],
    ["hub","Explore hub","land",LAND+"/?screen=hub"],
    ["captain","Captain","land",LAND+"/?screen=captain"],
    ["news-pop","News (popup)","land",LAND+"/?screen=news"],
    ["service","Customer service","land",LAND+"/?screen=service"],
    ["v-mon","Village · Monterosso","land",LAND+"/?screen=village0"],
    ["v-ver","Village · Vernazza","land",LAND+"/?screen=village1"],
    ["v-cor","Village · Corniglia","land",LAND+"/?screen=village2"],
    ["v-man","Village · Manarola","land",LAND+"/?screen=village3"],
    ["v-rio","Village · Riomaggiore","land",LAND+"/?screen=village4"],

    ["bk1","Booking · 01 Tour","book",LAND+"/?screen=book"],
    ["bk2","Booking · 02 Date","book",LAND+"/?screen=book&step=date"],
    ["bk3","Booking · 03 Departure","book",LAND+"/?screen=book&step=time"],
    ["bk4","Booking · 04 Guests","book",LAND+"/?screen=book&step=guests"],
    ["bk5","Booking · 05 Summary","book",LAND+"/?screen=book&step=done"],
    ["bk6","Booking · Confirmation","book",LAND+"/?screen=book&step=sent"],

    ["guide","Guide (hub)","seo",LAND+"/guide"],
    ["monterosso","Monterosso","seo",LAND+"/monterosso"],
    ["beaches","Beaches","seo",LAND+"/monterosso/beaches"],
    ["restaurants","Restaurants","seo",LAND+"/monterosso/restaurants"],
    ["byboat","Cinque Terre by boat","seo",LAND+"/cinque-terre-by-boat"],
    ["c-ver","Vernazza (side)","seo",LAND+"/cinque-terre/vernazza"],
    ["c-man","Manarola (side)","seo",LAND+"/cinque-terre/manarola"],
    ["c-cor","Corniglia (side)","seo",LAND+"/cinque-terre/corniglia"],
    ["c-rio","Riomaggiore (side)","seo",LAND+"/cinque-terre/riomaggiore"],
    ["discover","Discover","seo",LAND+"/discover"],
    ["news","News","seo",LAND+"/news"],
    ["map","Map","seo",LAND+"/map"],

    ["k-home","Kunde · Hjem","kunde",APP+"/?preview=customer&section=home"],
    ["k-chat","Kunde · Chat","kunde",APP+"/?preview=customer&section=chat"],
    ["k-trips","Kunde · Turer","kunde",APP+"/?preview=customer&section=trips"],
    ["k-rec","Kunde · Kvitteringer","kunde",APP+"/?preview=customer&section=receipts"],
    ["k-other","Kunde · Andre reiser","kunde",APP+"/?preview=customer&section=otherTrips"],
    ["k-land","Kunde · Andre land","kunde",APP+"/?preview=customer&section=otherCountries"],
    ["k-prof","Kunde · Profil","kunde",APP+"/?preview=customer&section=profile"],

    ["s-home","Skipper · Hjem","skipper",APP+"/?preview=skipper&section=home"],
    ["s-chat","Skipper · Chat","skipper",APP+"/?preview=skipper&section=chat"],
    ["s-trips","Skipper · Mine avganger","skipper",APP+"/?preview=skipper&section=trips"],
    ["s-cust","Skipper · Kunder","skipper",APP+"/?preview=skipper&section=customers"],
    ["s-site","Skipper · Min side","skipper",APP+"/?preview=skipper&section=site"],
    ["s-prof","Skipper · Profil","skipper",APP+"/?preview=skipper&section=profile"],

    ["admin","Admin-konsoll","admin",APP+"/?preview=admin"]
  ];

  var CAT={land:"var(--land)",book:"var(--book)",seo:"var(--seo)",kunde:"var(--kunde)",skipper:"var(--skipper)",admin:"var(--admin)"};
  var KEY="mtr_pagegrid_order_v1", PKEY="mtr_pagegrid_preview";
  var byId={}; PAGES.forEach(function(p){byId[p[0]]=p;});
  var grid=document.getElementById("grid");
  var previews=localStorage.getItem(PKEY)==="1";

  function loadOrder(){
    var saved=null; try{saved=JSON.parse(localStorage.getItem(KEY));}catch(e){}
    var def=PAGES.map(function(p){return p[0];});
    if(!Array.isArray(saved)) return def;
    // keep only known ids, then append any new pages not in saved
    var clean=saved.filter(function(id){return byId[id];});
    def.forEach(function(id){if(clean.indexOf(id)<0)clean.push(id);});
    return clean;
  }
  var order=loadOrder();
  function save(){localStorage.setItem(KEY,JSON.stringify(order));}

  function tileEl(id,idx){
    var p=byId[id]; var c=CAT[p[2]];
    var d=document.createElement("div");
    d.className="tile"; d.draggable=true; d.dataset.id=id;
    d.style.setProperty("--c",c);
    var thumb;
    if(previews){
      thumb='<div class="thumb"><iframe loading="lazy" src="'+p[3]+'"></iframe></div>';
    }else{
      thumb='<div class="thumb"><div class="ph">'+ICON[p[2]]+'</div></div>';
    }
    d.innerHTML='<span class="pos">'+(idx+1)+'</span>'+thumb+
      '<div class="meta"><div><div class="nm">'+p[1]+'</div><div class="cat">'+p[2]+'</div></div>'+
      '<a href="'+p[3]+'" target="_blank" rel="noopener" title="Åpne live">åpne ↗</a></div>';
    return d;
  }

  function render(){
    grid.innerHTML="";
    order.forEach(function(id,idx){grid.appendChild(tileEl(id,idx));});
    wireDrag();
  }

  var dragId=null;
  function wireDrag(){
    [].forEach.call(grid.children,function(t){
      t.addEventListener("dragstart",function(e){dragId=t.dataset.id;t.classList.add("dragging");e.dataTransfer.effectAllowed="move";});
      t.addEventListener("dragend",function(){dragId=null;t.classList.remove("dragging");[].forEach.call(grid.children,function(x){x.classList.remove("over");});});
      t.addEventListener("dragover",function(e){e.preventDefault();if(t.dataset.id!==dragId)t.classList.add("over");});
      t.addEventListener("dragleave",function(){t.classList.remove("over");});
      t.addEventListener("drop",function(e){
        e.preventDefault();t.classList.remove("over");
        var tgt=t.dataset.id; if(!dragId||tgt===dragId)return;
        var i=order.indexOf(dragId), j=order.indexOf(tgt);
        var tmp=order[i];order[i]=order[j];order[j]=tmp;   // SWAP plasser
        save();render();
      });
    });
  }

  document.getElementById("reset").onclick=function(){
    if(confirm("Nullstille til standard-rekkefølge?")){localStorage.removeItem(KEY);order=loadOrder();render();}
  };
  document.getElementById("prev").onclick=function(){
    previews=!previews;localStorage.setItem(PKEY,previews?"1":"0");
    this.textContent="👁 Forhåndsvisning: "+(previews?"på":"av");render();
  };
  document.getElementById("exp").onclick=function(){
    var out=document.getElementById("out");
    var list=order.map(function(id,n){return (n+1)+". "+byId[id][1]+"  ["+byId[id][2]+"]";}).join("\n");
    out.innerHTML="<b>Din rekkefølge</b> (kopier gjerne):<pre>"+list+"\n\nIDs: "+JSON.stringify(order)+"</pre>";
    out.style.display="block";
    try{navigator.clipboard.writeText(list);}catch(e){}
  };
  document.getElementById("prev").textContent="👁 Forhåndsvisning: "+(previews?"på":"av");
  render();
</script>
</body>
</html>
