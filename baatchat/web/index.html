<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/monterosso-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <title>Monterosso — Chat</title>
    <meta
      name="description"
      content="Privat chat mellom kunder og skippere."
    />

    <!-- PWA: installable app shell (Apple white system) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#fffefc" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Monterosso" />

    <script>
      // Register the minimal service worker (app-shell caching only) once the page
      // is loaded, so it never competes with first paint. Silently no-ops where SW
      // is unsupported or blocked (e.g. private mode).
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/sw.js").catch(function () {});
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="/visitor.js" defer></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
