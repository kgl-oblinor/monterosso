# Monterosso boat-platform chat (customer ↔ skipper) — Worker config.
name = "monterosso-chat"
main = "src/worker/index.ts"
compatibility_date = "2026-06-16"
compatibility_flags = ["nodejs_compat"]

# API served on the workers.dev URL.
workers_dev = true

# Non-secret config. Secrets (ADMIN_PASSWORD, ADMIN_SYNC_KEY, CHAT_JWT_SECRET,
# SENDGRID_API_KEY) are set with: pnpm exec wrangler secret put <NAME>
[vars]
# Platform branding — used in onboarding email + service identity. Configurable.
PLATFORM_NAME = "Monterosso"
# Verified SendGrid sender for onboarding one-time-code emails.
EMAIL_FROM = "post@monterosso.example"
SUPPORT_EMAIL = "kgl@oblinor.no"
# Admin (Kristian) emails allowed to use password login (/auth/admin-login). Password is
# the ADMIN_PASSWORD secret (set via `wrangler secret put`), never stored here.
ADMIN_EMAILS = "kgl@oblinor.no"
ALLOWED_ORIGINS = "http://localhost:5173"
# Defaults for local dev. CI overrides these per deploy with `--var`.
APP_VERSION = "dev"
GIT_SHA = "local"

# D1 — relational data + message history. `database_id` is filled in after
# `wrangler d1 create monterosso_chat` (provisioning — owned by the integration lane).
[[d1_databases]]
binding = "DB"
database_name = "monterosso_chat"
database_id = "REPLACE_WITH_NEW_D1_ID"
migrations_dir = "migrations"

# KV — short-lived OTP codes (native TTL) + rate-limit counters.
# `id` is filled in after `wrangler kv namespace create OTP`.
[[kv_namespaces]]
binding = "OTP"
id = "REPLACE_WITH_NEW_KV_ID"
